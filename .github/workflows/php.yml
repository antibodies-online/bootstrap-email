name: PHPUnit

on:
  push:
    branches:
      - master
      - v1
  pull_request:
    branches:
      - master
      - v1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:

    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - php: '8.1'
          - php: '8.1'
            mode: high-deps
          - php: '8.1'
            mode: low-deps
          - php: '8.2'
          - php: '8.3'
          - php: '8.4'
          - php: '8.5'

    steps:
    - uses: actions/checkout@v3

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run test suite
      run: composer test
